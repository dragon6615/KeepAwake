name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # 允許在 GitHub 網頁上手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -ldflags "-H windowsgui" -o KeepAwake.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeepAwake
          path: KeepAwake.exe
          if-no-files-found: error
